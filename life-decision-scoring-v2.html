<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生重大決策評估器 | Life Decision Scoring Tool</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#18212f;
      --muted:#64748b;
      --line:#e6ebf2;
      --primary:#111827;
      --soft:#f8fafc;
      --accent:#eef2ff;
      --shadow:0 8px 30px rgba(15,23,42,.06);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#f8fafc 0%,#f5f7fb 100%);color:var(--text)}
    button,input,textarea,select{font:inherit}
    .app{max-width:1180px;margin:0 auto;padding:28px 18px 60px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:22px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:42px;height:42px;border-radius:14px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:700;box-shadow:var(--shadow)}
    .brand h1{margin:0;font-size:clamp(24px,3vw,34px);line-height:1.12}
    .brand p{margin:6px 0 0;color:var(--muted);font-size:14px}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .lang-switch,.icon-btn,.primary-btn,.ghost-btn,.danger-btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:14px;padding:10px 14px;cursor:pointer;transition:.22s ease;box-shadow:none}
    .lang-switch:hover,.icon-btn:hover,.ghost-btn:hover{background:#f8fafc}
    .primary-btn{background:var(--primary);color:#fff;border-color:var(--primary)}
    .primary-btn:hover{transform:translateY(-1px);opacity:.96}
    .danger-btn{background:#fff;color:#b91c1c}
    .icon-btn{padding:10px 12px;display:flex;align-items:center;gap:8px}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:20px;align-items:start}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .section{padding:24px}
    .section h2{margin:0;font-size:24px}
    .section .sub{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.6}
    .step-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}
    .step-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:var(--soft);color:var(--muted);font-size:13px;margin-bottom:12px}
    .progress{display:flex;gap:8px;flex-wrap:wrap}
    .dot{width:10px;height:10px;border-radius:999px;background:#dbe2ea;transition:.25s ease}
    .dot.done,.dot.active{background:var(--primary)}
    .grid{display:grid;gap:14px}
    .topics{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .topic-card{padding:18px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;transition:.22s ease;text-align:left}
    .topic-card:hover{transform:translateY(-2px);border-color:#cfd8e3}
    .topic-card.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .topic-card .desc{margin-top:8px;color:inherit;opacity:.82;font-size:13px;line-height:1.5}
    .field{display:grid;gap:8px}
    .label{font-size:14px;font-weight:600}
    .hint{font-size:12px;color:var(--muted)}
    .input,.textarea,.select{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 14px;color:var(--text);outline:none;transition:.2s ease}
    .input:focus,.textarea:focus,.select:focus{border-color:#c7d2fe;box-shadow:0 0 0 4px rgba(99,102,241,.08)}
    .textarea{min-height:100px;resize:vertical}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .space-between{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .item-list{display:grid;gap:12px}
    .item{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}
    .item-grid{display:grid;gap:12px;grid-template-columns:1.4fr 140px 140px 120px auto}
    .mini-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
    .pill{display:inline-block;padding:6px 10px;background:var(--soft);border-radius:999px;color:var(--muted);font-size:12px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px}
    table{width:100%;border-collapse:collapse;background:#fff;min-width:760px}
    th,td{padding:14px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    th{background:#fbfcfe;font-size:14px}
    tr:last-child td{border-bottom:none}
    .score-input{width:90px}
    .result-list{display:grid;gap:12px}
    .result-item{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}
    .winner{background:var(--primary);color:#fff;border-color:var(--primary)}
    .actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:22px}
    .history-panel{position:sticky;top:18px;overflow:hidden}
    .history-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .history-body{padding:18px;display:grid;gap:18px}
    .collapsed .history-body{display:none}
    .timeline{display:grid;gap:12px}
    .timeline-item{padding:12px 14px;border-radius:16px;background:var(--soft)}
    .timeline-item strong{display:block;margin-bottom:4px}
    .fade{animation:fadeSlide .35s ease}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .hidden{display:none!important}
    .muted{color:var(--muted)}
    .small{font-size:13px}
    .tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .empty{padding:18px;border:1px dashed var(--line);border-radius:18px;background:#fcfdff;color:var(--muted)}
    @media (max-width:1024px){.layout{grid-template-columns:1fr}.history-panel{position:static}}
    @media (max-width:760px){.app{padding:18px 14px 44px}.section{padding:18px}.item-grid{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.actions{align-items:stretch}.actions > div{display:flex;gap:10px;flex-wrap:wrap}}
  </style>
</head>

const STORAGE_KEY = 'life-decision-tool-v2';

function uid(){ return Math.random().toString(36).slice(2,9); }
function clone(x){ return JSON.parse(JSON.stringify(x)); }
function buildScenario(lang, presetId){
  const preset = PRESETS[lang].find(p=>p.id===presetId) || PRESETS[lang][0];
  const factorScores = {};
  preset.options.forEach(option=>{
    factorScores[option] = {};
    preset.factors.forEach(f=> factorScores[option][f.id]=5);
  });
  return { presetId:preset.id, topicTitle:preset.title, topicDescription:preset.description, notes:'', options:clone(preset.options), factors:clone(preset.factors), factorScores };
}
function normalizeFactors(factors){
  const total = factors.reduce((s,f)=>s + Number(f.value||0), 0);
  return factors.map(f=>({...f, normalized: total ? Number(f.value||0)/total*100 : 0}));
}
function effectiveScore(score, preference){
  const s = Math.max(0, Math.min(10, Number(score||0)));
  return preference === 'low' ? 10 - s : s;
}
function calcResults(scenario){
  const factors = normalizeFactors(scenario.factors);
  return scenario.options.map(option=>{
    const total = factors.reduce((sum,f)=>{
      const score = effectiveScore(scenario.factorScores?.[option]?.[f.id] ?? 5, f.preference);
      return sum + (score * f.normalized)/100;
    },0);
    return { option, total:Number(total.toFixed(2)) };
  }).sort((a,b)=>b.total-a.total);
}

let state = loadState();
function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return { lang:'zh', currentStep:1, historyOpen:false, scenario: buildScenario('zh','mba') };
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function rerender(){ saveState(); renderStaticTexts(); renderMain(); renderHistory(); }

  document.getElementById('storageHint').textContent = t.storageHint;
  document.getElementById('resetAllBtn').textContent = t.resetAll;
}

}

    <div><button class="primary-btn" id="nextBtn">${nextLabel || (state.currentStep===4 ? t.seeResult : t.next+' →')}</button></div>
  </div>`; }

function renderMain(){
  const t = T[state.lang];
  const panel = document.getElementById('mainPanel');
  panel.classList.remove('fade'); void panel.offsetWidth; panel.classList.add('fade');
  if(state.currentStep===1){
    const presets = PRESETS[state.lang];
    panel.innerHTML = `
      <div class="step-header">
        <div>
          <div class="step-badge">${t.step1}</div>
          <h2>${t.appTitle}</h2>
          <p class="sub">${t.step1sub}</p>
        </div>
        ${stepDots()}
      </div>
      <div class="field">
        <div class="label">${t.chooseTopic}</div>
        <div class="grid topics">
          ${presets.map(p=>`<button class="topic-card ${state.scenario.presetId===p.id?'active':''}" data-preset="${p.id}">
            <strong>${p.title}</strong>
            <div class="desc">${p.description}</div>
          </button>`).join('')}
        </div>
      </div>
      <div class="grid" style="margin-top:18px;">
        <div class="field"><label class="label">${t.topicName}</label><input class="input" id="topicTitleInput" value="${escapeHtml(state.scenario.topicTitle)}"></div>
        <div class="field"><label class="label">${t.topicDesc}</label><textarea class="textarea" id="topicDescInput">${escapeHtml(state.scenario.topicDescription||'')}</textarea></div>
        <div class="field"><label class="label">${t.notes}</label><textarea class="textarea" id="notesInput" placeholder="${t.notesHint}">${escapeHtml(state.scenario.notes||'')}</textarea></div>
      </div>
      ${navButtons(false)}
    `;
    panel.querySelectorAll('[data-preset]').forEach(btn=>btn.onclick=()=>{
      state.scenario = buildScenario(state.lang, btn.dataset.preset);
      rerender();
    });
    bindBasicScenarioInputs();
  }
  if(state.currentStep===2){
    panel.innerHTML = `
      <div class="step-header">
        <div>
          <div class="step-badge">${t.step2}</div>
          <h2>${state.scenario.topicTitle}</h2>
          <p class="sub">${t.step2sub}</p>
        </div>
        ${stepDots()}
      </div>
      <div class="space-between"><div class="label">${t.options}</div><button class="ghost-btn" id="addOptionBtn">+ ${t.addOption}</button></div>
      <div class="item-list" id="optionList">
        ${state.scenario.options.map((option,idx)=>`<div class="item row"><span class="pill">${t.options} ${idx+1}</span><input class="input option-input" data-idx="${idx}" value="${escapeHtml(option)}"><button class="danger-btn remove-option" data-option="${encodeURIComponent(option)}">✕</button></div>`).join('')}
      </div>
      ${navButtons(true)}
    `;
    document.getElementById('addOptionBtn').onclick=addOption;
    panel.querySelectorAll('.option-input').forEach(inp=>inp.oninput=(e)=>renameOption(Number(e.target.dataset.idx), e.target.value));
    panel.querySelectorAll('.remove-option').forEach(btn=>btn.onclick=()=>removeOption(decodeURIComponent(btn.dataset.option)));
  }
  if(state.currentStep===3){
    const nf = normalizeFactors(state.scenario.factors);
    panel.innerHTML = `
      <div class="step-header">
        <div>
          <div class="step-badge">${t.step3}</div>
          <h2>${state.scenario.topicTitle}</h2>
          <p class="sub">${t.step3sub}</p>
        </div>
        ${stepDots()}
      </div>
      <div class="space-between"><div class="label">${t.step3}</div><button class="ghost-btn" id="addFactorBtn">+ ${t.addFactor}</button></div>
      <div class="item-list">
        ${state.scenario.factors.map((f,idx)=>`<div class="item">
          <div class="item-grid">
            <input class="input factor-name" data-id="${f.id}" value="${escapeHtml(f.name)}">
            <select class="select factor-mode" data-id="${f.id}">
              <option value="weight" ${f.mode==='weight'?'selected':''}>${t.weight}</option>
              <option value="probability" ${f.mode==='probability'?'selected':''}>${t.probability}</option>
            </select>
            <input type="number" min="0" max="100" class="input factor-value" data-id="${f.id}" value="${f.value}">
            <select class="select factor-pref" data-id="${f.id}">
              <option value="high" ${f.preference==='high'?'selected':''}>${t.higherBetter}</option>
              <option value="low" ${f.preference==='low'?'selected':''}>${t.lowerBetter}</option>
            </select>
            <button class="danger-btn remove-factor" data-id="${f.id}">✕</button>
          </div>
          <div class="tag-row">
            <span class="pill">${f.mode==='weight'?t.weight:t.probability}: ${f.value}</span>
            <span class="pill">${t.normalized}: ${(nf[idx].normalized).toFixed(1)}%</span>
          </div>
        </div>`).join('')}
      </div>
      <div class="empty">${t.factorHint}</div>
      ${navButtons(true)}
    `;
    document.getElementById('addFactorBtn').onclick=addFactor;
    panel.querySelectorAll('.factor-name').forEach(el=>el.oninput=e=>updateFactor(e.target.dataset.id,'name',e.target.value));
    panel.querySelectorAll('.factor-mode').forEach(el=>el.onchange=e=>updateFactor(e.target.dataset.id,'mode',e.target.value));
    panel.querySelectorAll('.factor-value').forEach(el=>el.oninput=e=>updateFactor(e.target.dataset.id,'value',Number(e.target.value||0)));
    panel.querySelectorAll('.factor-pref').forEach(el=>el.onchange=e=>updateFactor(e.target.dataset.id,'preference',e.target.value));
    panel.querySelectorAll('.remove-factor').forEach(el=>el.onclick=()=>removeFactor(el.dataset.id));
  }
  if(state.currentStep===4){
    panel.innerHTML = `
      <div class="step-header">
        <div>
          <div class="step-badge">${t.step4}</div>
          <h2>${state.scenario.topicTitle}</h2>
          <p class="sub">${t.step4sub}</p>
        </div>
        ${stepDots()}
      </div>
      <div class="table-wrap"><table><thead><tr><th>${t.optionCol}</th>${state.scenario.options.map(o=>`<th>${escapeHtml(o)}</th>`).join('')}</tr></thead>
      <tbody>
      ${state.scenario.factors.map(f=>`<tr><td><strong>${escapeHtml(f.name)}</strong><div class="small muted">${f.mode==='weight'?t.weight:t.probability} ${f.value} · ${f.preference==='high'?t.higherBetter:t.lowerBetter}</div></td>
      ${state.scenario.options.map(o=>`<td><input type="number" min="0" max="10" step="1" class="input score-input" data-option="${encodeURIComponent(o)}" data-factor="${f.id}" value="${state.scenario.factorScores?.[o]?.[f.id] ?? 5}"></td>`).join('')}</tr>`).join('')}
      </tbody></table></div>
      <div class="empty">${t.scoreHint}</div>
      ${navButtons(true)}
    `;
    panel.querySelectorAll('.score-input').forEach(el=>el.oninput=e=>updateScore(decodeURIComponent(e.target.dataset.option), e.target.dataset.factor, e.target.value));
  }
  if(state.currentStep===5){
    const results = calcResults(state.scenario);
    panel.innerHTML = `
      <div class="step-header">
        <div>
          <div class="step-badge">${t.result}</div>
          <h2>${state.scenario.topicTitle}</h2>
          <p class="sub">${t.resultSub}</p>
        </div>
        ${stepDots()}
      </div>
      ${results[0]?`<div class="result-item winner"><div class="small">${t.winner}</div><div style="font-size:28px;font-weight:700;margin-top:6px;">${escapeHtml(results[0].option)}</div><div style="margin-top:6px;opacity:.85;">${results[0].total} / 10</div></div>`:''}
      <div class="result-list" style="margin-top:16px;">
        ${results.map((r,i)=>`<div class="result-item"><div class="space-between"><div><div class="small muted">${t.rank} #${i+1}</div><strong>${escapeHtml(r.option)}</strong></div><div style="font-size:28px;font-weight:700;">${r.total}</div></div></div>`).join('')}
      </div>
      <div class="actions"><div><button class="ghost-btn" id="backBtn">← ${t.editAgain}</button></div><div><button class="primary-btn" id="nextBtn">${t.finish}</button></div></div>
    `;
  }

  const backBtn = document.getElementById('backBtn'); if(backBtn) backBtn.onclick=()=>{ state.currentStep = Math.max(1,state.currentStep-1); rerender(); };
  const nextBtn = document.getElementById('nextBtn'); if(nextBtn) nextBtn.onclick=()=>{
    if(state.currentStep===5){ state.currentStep=1; rerender(); return; }
    state.currentStep = Math.min(5, state.currentStep+1); rerender();
  };
}

function renderHistory(){
  const t = T[state.lang];
  const panel = document.getElementById('historyPanel');
  panel.classList.toggle('collapsed', !state.historyOpen);
  const timeline = document.getElementById('timeline');
  const stages = t.stageNames;
  const results = calcResults(state.scenario);
  timeline.innerHTML = `
    <div class="timeline-item"><strong>${stages[0]}</strong><div class="small muted">${escapeHtml(state.scenario.topicTitle || '-')}</div></div>
    <div class="timeline-item"><strong>${stages[1]}</strong><div class="small muted">${state.scenario.options.map(escapeHtml).join(' · ') || '-'}</div></div>
    <div class="timeline-item"><strong>${stages[2]}</strong><div class="small muted">${state.scenario.factors.map(f=>escapeHtml(f.name)).join(' · ') || '-'}</div></div>
    <div class="timeline-item"><strong>${stages[3]}</strong><div class="small muted">${state.scenario.options.length} options · ${state.scenario.factors.length} factors</div></div>
    <div class="timeline-item"><strong>${stages[4]}</strong><div class="small muted">${results[0] ? escapeHtml(results[0].option) + ' · ' + results[0].total + '/10' : t.noData}</div></div>
  `;
}

function bindBasicScenarioInputs(){
  document.getElementById('topicTitleInput').oninput=e=>{ state.scenario.topicTitle=e.target.value; saveState(); renderHistory(); };
  document.getElementById('topicDescInput').oninput=e=>{ state.scenario.topicDescription=e.target.value; saveState(); renderHistory(); };
  document.getElementById('notesInput').oninput=e=>{ state.scenario.notes=e.target.value; saveState(); renderHistory(); };
}
function renameOption(index, nextName){
  const oldName = state.scenario.options[index];
  state.scenario.options[index] = nextName;
  if(oldName !== nextName){
    state.scenario.factorScores[nextName] = state.scenario.factorScores[oldName] || {};
    delete state.scenario.factorScores[oldName];
  }
  rerender();
}
function addOption(){
  const name = `${state.lang==='zh'?'新選項':'New option'} ${state.scenario.options.length+1}`;
  state.scenario.options.push(name);
  state.scenario.factorScores[name] = {};
  state.scenario.factors.forEach(f=>state.scenario.factorScores[name][f.id]=5);
  rerender();
}
function removeOption(option){
  if(state.scenario.options.length<=2) return;
  state.scenario.options = state.scenario.options.filter(o=>o!==option);
  delete state.scenario.factorScores[option];
  rerender();
}
function addFactor(){
  const factor = { id:uid(), name: state.lang==='zh'?`新因子 ${state.scenario.factors.length+1}`:`New factor ${state.scenario.factors.length+1}`, mode:'weight', value:10, preference:'high' };
  state.scenario.factors.push(factor);
  state.scenario.options.forEach(o=>state.scenario.factorScores[o][factor.id]=5);
  rerender();
}
function updateFactor(id, field, value){
  const f = state.scenario.factors.find(x=>x.id===id); if(!f) return; f[field]=value; rerender();
}
function removeFactor(id){
  if(state.scenario.factors.length<=2) return;
  state.scenario.factors = state.scenario.factors.filter(f=>f.id!==id);
  state.scenario.options.forEach(o=>delete state.scenario.factorScores[o][id]);
  rerender();
}
function updateScore(option, factorId, value){
  state.scenario.factorScores[option][factorId] = Math.max(0, Math.min(10, Number(value||0)));
  saveState(); renderHistory();
}
function escapeHtml(str){ return String(str ?? '').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

// events
const langBtn = document.getElementById('langBtn');
langBtn.onclick = ()=>{
  const next = state.lang==='zh' ? 'en' : 'zh';
  const currentPresetId = state.scenario.presetId || 'mba';
  const nextPreset = PRESETS[next].find(p=>p.id===currentPresetId) || PRESETS[next][0];
  state.lang = next;
  if(state.currentStep===1 && PRESETS[next].some(p=>p.id===currentPresetId)){
    state.scenario = { ...state.scenario, presetId: nextPreset.id, topicTitle: nextPreset.title, topicDescription: nextPreset.description,
      options: state.scenario.options.length===PRESETS[state.lang==='zh'?'en':'zh'].find(p=>p.id===currentPresetId)?.options?.length ? clone(nextPreset.options) : state.scenario.options,
    };
  }
  rerender();
};

document.getElementById('historyToggleBtn').onclick = ()=>{ state.historyOpen = true; rerender(); };
document.getElementById('collapseHistoryBtn').onclick = ()=>{ state.historyOpen = false; rerender(); };
document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'life-decision.json'; a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
document.getElementById('importFile').onchange = async (e)=>{
  const file = e.target.files[0]; if(!file) return;
  try{ const text = await file.text(); const data = JSON.parse(text); if(!data.scenario) throw new Error('bad'); state = data; alert(T[state.lang].imported); rerender(); }
  catch(err){ alert(T[state.lang].invalidFile); }
  e.target.value='';
};
document.getElementById('resetAllBtn').onclick = ()=>{
  if(confirm(T[state.lang].resetConfirm)) { state = { lang: state.lang, currentStep:1, historyOpen:false, scenario: buildScenario(state.lang,'mba') }; rerender(); }
};

rerender();
</script>
</body>
</html>
