<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生重大決策評估器 | Life Decision Scoring Tool</title>
  <style>
    :root{
      --bg:#f5f7fb;--bg2:#fcfdff;--card:#ffffff;--text:#142033;--muted:#6b7280;--line:#e6edf5;
      --primary:#111827;--primary-2:#1f2937;--soft:#f8fafc;--soft2:#eef3f8;--shadow:0 18px 42px rgba(15,23,42,.07);
      --radius:24px;--danger:#b91c1c;--success:#0f172a;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg2),var(--bg));color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,textarea{font:inherit}
    .app{max-width:1060px;margin:0 auto;padding:28px 18px 54px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;font-size:22px;box-shadow:var(--shadow)}
    h1{margin:0;font-size:clamp(26px,3vw,34px);line-height:1.08}
    .subtitle{margin-top:6px;color:var(--muted);font-size:14px}
    .top-actions{display:flex;gap:10px;align-items:center}
    .btn,.icon-btn,.lang-btn,.danger-btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:14px;padding:10px 14px;cursor:pointer;transition:transform .2s ease,background .2s ease,border-color .2s ease,box-shadow .2s ease,opacity .2s ease}
    .btn:hover,.icon-btn:hover,.lang-btn:hover,.danger-btn:hover{background:var(--soft);transform:translateY(-1px);box-shadow:0 10px 18px rgba(15,23,42,.05)}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .danger-btn{color:var(--danger)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .section{padding:24px}
    .small{font-size:13px;line-height:1.6}.muted{color:var(--muted)}
    .progress-wrap{display:grid;gap:12px;margin-bottom:18px}
    .progress-row{display:flex;align-items:center;gap:10px;flex-wrap:nowrap;overflow:auto;padding-bottom:2px}
    .progress-step{display:flex;align-items:center;gap:10px;white-space:nowrap;transition:.28s ease}
    .dot{width:14px;height:14px;border-radius:999px;background:#d5deea;transition:.28s ease;box-shadow:inset 0 0 0 1px rgba(15,23,42,.03)}
    .progress-step.done .dot,.progress-step.active .dot{background:var(--primary);transform:scale(1.08)}
    .progress-label{font-size:13px;color:#93a0b0;transition:.28s ease}
    .progress-step.done .progress-label,.progress-step.active .progress-label{color:#38475a}
    .progress-line{width:34px;height:1.5px;background:#dde5ef;border-radius:999px;flex:0 0 auto}
    .panel-shell{position:relative;min-height:560px}
    .view{animation:viewIn .48s cubic-bezier(.2,.7,.2,1)}
    @keyframes viewIn{0%{opacity:0;transform:translateY(16px) scale(.992)}100%{opacity:1;transform:translateY(0) scale(1)}}
    .step-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.step-title h2{margin:0;font-size:24px}
    .field{display:grid;gap:8px}.label{font-size:14px;font-weight:600}.hint{font-size:12px;color:var(--muted);line-height:1.55}
    .input,.textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff;outline:none;transition:border-color .18s ease,box-shadow .18s ease}
    .input:focus,.textarea:focus{border-color:#cfd8e3;box-shadow:0 0 0 4px rgba(148,163,184,.12)}
    .textarea{min-height:96px;resize:vertical}
    .grid{display:grid;gap:14px}.topics{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .topic-card{padding:18px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;text-align:left;transition:transform .24s ease,border-color .24s ease,background .24s ease,color .24s ease,box-shadow .24s ease}
    .topic-card:hover{transform:translateY(-3px);border-color:#d6dfeb;box-shadow:0 12px 24px rgba(15,23,42,.06)}
    .topic-card.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .topic-card .desc{margin-top:8px;font-size:13px;line-height:1.55;opacity:.86}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.space-between{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .item-list{display:grid;gap:12px}.item{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;transition:.2s ease}.item:hover{border-color:#d8e0ea}
    .item-grid{display:grid;gap:12px;grid-template-columns:1.55fr 130px auto}.factor-grid{display:grid;gap:12px;grid-template-columns:1.55fr 140px auto}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:var(--soft);color:var(--muted);font-size:12px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}
    table{width:100%;min-width:920px;border-collapse:collapse}th,td{padding:14px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}tr:last-child td{border-bottom:none}th{background:#fbfcfe;font-size:14px;position:sticky;top:0}
    .num-wrap{display:flex;align-items:center;gap:6px}.num-input{width:88px}.pct{font-size:12px;color:var(--muted)}
    .actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:24px}.actions>div{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .summary-box{padding:15px;border-radius:18px;background:var(--soft);border:1px solid var(--line)}
    .results{display:grid;gap:12px}.result-card{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}.winner{background:var(--primary);color:#fff;border-color:var(--primary)}
    .chart-card{padding:18px;border:1px solid var(--line);border-radius:20px;background:#fff}
    .bars{display:grid;gap:12px;margin-top:10px}.bar-row{display:grid;grid-template-columns:minmax(110px,180px) 1fr 62px;gap:14px;align-items:center}.bar-track{height:14px;background:var(--soft2);border-radius:999px;overflow:hidden}.bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-2));border-radius:999px;transition:width .7s cubic-bezier(.2,.7,.2,1)}
    .bar-label{font-size:14px;font-weight:600;line-height:1.4}.bar-value{font-size:14px;text-align:right;color:#334155}
    .rank-table{display:grid;gap:10px;margin-top:14px}
    .rank-item{display:grid;grid-template-columns:64px 1fr 80px;gap:14px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}
    .rank-badge{font-size:12px;color:var(--muted);background:var(--soft);border-radius:999px;padding:6px 10px;display:inline-block;text-align:center}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.28);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px;z-index:60}
    .modal-backdrop.open{display:flex;animation:fadeIn .22s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    @keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.modal-body{padding:20px;display:grid;gap:18px}
    .history-actions{display:grid;gap:10px}
    .hidden{display:none !important}
    @media (max-width:760px){.app{padding:18px 14px 38px}.section{padding:18px}.item-grid,.factor-grid{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}.progress-line{width:16px}.progress-label{display:none}.panel-shell{min-height:auto}.bar-row{grid-template-columns:1fr}.rank-item{grid-template-columns:1fr}.modal{border-radius:22px}}
  </style>
</head>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">🌟</div>

          <div class="hint" id="fileActionsHint" style="margin-top:8px"></div>
        </div>
        <div>
          <div class="label" id="storageTitle"></div>
          <div class="hint" id="storageHint" style="margin-top:8px"></div>
        </div>
        <div>
          <button class="danger-btn" id="resetAllBtn"></button>
        </div>
      </div>
    </div>
  </div>

const T={

const STORAGE_KEY='life-decision-v3';
let lang='zh',currentStep=1,selectedPresetId='mba',scenario=null,historyOpen=false;
function uid(){return Math.random().toString(36).slice(2,9)}
function deepClone(v){return JSON.parse(JSON.stringify(v))}
function presetById(id,l=lang){return PRESETS[l].find(p=>p.id===id)||PRESETS[l][0]}
function buildScenarioFromPreset(id,l=lang){const p=deepClone(presetById(id,l));const optionScores={},optionProbabilities={};p.options.forEach(o=>{optionScores[o]={};optionProbabilities[o]={};p.factors.forEach(f=>{optionScores[o][f.id]=5;optionProbabilities[o][f.id]=1})});return{topicTitle:p.title,topicDescription:p.description,options:p.options,factors:p.factors,optionScores,optionProbabilities}}
function normalizeFactors(){const total=scenario.factors.reduce((s,f)=>s+Number(f.weight||0),0)||1;return scenario.factors.map(f=>({...f,normalized:Number(f.weight||0)/total}))}
function results(){const nf=normalizeFactors();return scenario.options.map(opt=>{const total=nf.reduce((sum,f)=>{const score=Number((scenario.optionScores[opt]||{})[f.id]??0);const prob=Number((scenario.optionProbabilities[opt]||{})[f.id]??1);return sum+(score*f.normalized*prob)},0);return{option:opt,total:Number(total.toFixed(2))}}).sort((a,b)=>b.total-a.total)}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify({lang,currentStep,selectedPresetId,scenario}))}
function loadState(){const raw=localStorage.getItem(STORAGE_KEY);if(!raw){scenario=buildScenarioFromPreset(selectedPresetId,lang);return}try{const data=JSON.parse(raw);lang=data.lang||lang;currentStep=data.currentStep||1;selectedPresetId=data.selectedPresetId||selectedPresetId;scenario=data.scenario||buildScenarioFromPreset(selectedPresetId,lang)}catch(e){scenario=buildScenarioFromPreset(selectedPresetId,lang)}}
function escapeHtml(str=''){return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function escapeJs(str=''){return String(str).replaceAll('\\','\\\\').replaceAll("'","\\'")}
function renderProgress(){const t=T[lang];const el=document.getElementById('fixedProgress');let html='';t.progress.forEach((label,idx)=>{const step=idx+1;const cls=currentStep===step?'active':currentStep>step?'done':'';html+=`<div class="progress-step ${cls}"><div class="dot"></div><div class="progress-label">${label}</div></div>`;if(step<5)html+='<div class="progress-line"></div>'});el.innerHTML=html}
function renderChrome(){const t=T[lang];document.getElementById('appTitle').textContent=t.appTitle;document.getElementById('appSubtitle').textContent=t.appSubtitle;document.getElementById('langBtn').textContent=lang==='zh'?'EN':'中';document.getElementById('historyToggleBtn').textContent=t.history;document.getElementById('historyTitle').textContent=t.history;document.getElementById('historySub').textContent=t.historySub;document.getElementById('fileActionsTitle').textContent=t.fileActionsTitle;document.getElementById('fileActionsHint').textContent=t.fileActionsHint;document.getElementById('storageTitle').textContent=t.storageTitle;document.getElementById('storageHint').textContent=t.storageHint;document.getElementById('exportBtn').textContent=t.exportDecision;document.getElementById('importBtn').textContent=t.importDecision;document.getElementById('resetAllBtn').textContent=t.resetAll;document.getElementById('historyModal').classList.toggle('open',historyOpen);renderProgress()}
function renderMain(){const t=T[lang];const main=document.getElementById('mainPanel');let html='<div class="view">';
if(currentStep===1){html+=`<div class="step-title"><div><h2>${t.chooseTopic}</h2><div class="muted small">${t.chooseTopicSub}</div></div></div><div class="grid topics">`;PRESETS[lang].forEach(p=>{html+=`<button class="topic-card ${selectedPresetId===p.id?'active':''}" onclick="selectPreset('${p.id}')"><div style="font-weight:700">${p.title}</div><div class="desc">${p.description}</div></button>`});html+=`</div><div class="grid" style="margin-top:18px"><div class="field"><div class="label">${t.topicName}</div><input class="input" value="${escapeHtml(scenario.topicTitle)}" oninput="updateScenario('topicTitle', this.value)"></div><div class="field"><div class="label">${t.topicDesc}</div><textarea class="textarea" oninput="updateScenario('topicDescription', this.value)">${escapeHtml(scenario.topicDescription||'')}</textarea><div class="hint">${t.topicDescHint}</div></div></div><div class="actions"><div></div><div><button class="btn primary" onclick="goNext()">${t.next}</button></div></div>`}
if(currentStep===2){html+=`<div class="step-title"><div><h2>${t.defineOptions}</h2><div class="muted small">${t.defineOptionsSub}</div></div><button class="btn" onclick="addOption()">${t.addOption}</button></div><div class="item-list">`;scenario.options.forEach((opt,idx)=>{html+=`<div class="item"><div class="item-grid"><input class="input" value="${escapeHtml(opt)}" oninput="renameOption(${idx}, this.value)"><div class="badge">${t.option} ${idx+1}</div><button class="danger-btn" onclick="removeOption('${escapeJs(opt)}')">${t.remove}</button></div></div>`});html+=`</div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn primary" onclick="goNext()">${t.next}</button></div></div>`}
if(currentStep===3){const totalWeight=scenario.factors.reduce((s,f)=>s+Number(f.weight||0),0);html+=`<div class="step-title"><div><h2>${t.defineFactors}</h2><div class="muted small">${t.defineFactorsSub}</div></div><button class="btn" onclick="addFactor()">${t.addFactor}</button></div><div class="summary-box small"><strong>${t.weight}</strong><br>${t.weightHint}</div><div class="item-list" style="margin-top:14px">`;scenario.factors.forEach(f=>{html+=`<div class="item"><div class="factor-grid"><input class="input" value="${escapeHtml(f.name)}" oninput="updateFactor('${f.id}','name',this.value)"><input class="input" type="number" min="0" step="1" value="${Number(f.weight||0)}" oninput="updateFactor('${f.id}','weight',this.value)"><button class="danger-btn" onclick="removeFactor('${f.id}')">${t.remove}</button></div></div>`});html+=`</div><div class="hint" style="margin-top:10px">${t.totalWeight}: ${totalWeight}</div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn primary" onclick="goNext()">${t.next}</button></div></div>`}
if(currentStep===4){html+=`<div class="step-title"><div><h2>${t.scoring}</h2><div class="muted small">${t.scoringSub}</div></div></div><div class="summary-box small"><strong>${t.score}</strong><br>${t.scoreHint}<br><br><strong>${t.probability}</strong><br>${t.probabilityHint}</div><div class="table-wrap" style="margin-top:14px"><table><thead><tr><th>${t.factor}</th>`;scenario.options.forEach(opt=>html+=`<th>${escapeHtml(opt)}</th>`);html+='</tr></thead><tbody>';scenario.factors.forEach(f=>{html+=`<tr><td><div style="font-weight:600">${escapeHtml(f.name)}</div><div class="hint">${t.weight}: ${Number(f.weight||0)}</div></td>`;scenario.options.forEach(opt=>{const score=Number((scenario.optionScores[opt]||{})[f.id]??5);const probPercent=Math.round(Number((scenario.optionProbabilities[opt]||{})[f.id]??1)*100);html+=`<td><div class="row"><div><div class="hint">${t.score}</div><input class="input num-input" type="number" min="0" max="10" step="1" value="${score}" oninput="updateCell('${escapeJs(opt)}','${f.id}','score',this.value)"></div><div><div class="hint">${t.probability}</div><div class="num-wrap"><input class="input num-input" type="number" min="0" max="100" step="1" value="${probPercent}" oninput="updateCell('${escapeJs(opt)}','${f.id}','prob',this.value)"><span class="pct">%</span></div></div></div></td>`});html+='</tr>'});html+=`</tbody></table></div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn primary" onclick="goNext()">${t.finish}</button></div></div>`}
if(currentStep===5){const r=results();const top=r[0];const max=Math.max(...r.map(x=>x.total),1);html+=`<div class="step-title"><div><h2>${t.resultTitle}</h2><div class="muted small">${t.resultSub}</div></div></div>`;if(top){html+=`<div class="result-card winner"><div class="small" style="opacity:.85">${t.highest}</div><div style="font-size:28px;font-weight:700;margin-top:6px">${escapeHtml(top.option)}</div><div class="small" style="opacity:.85;margin-top:8px">${top.total} / 10</div></div>`}html+=`<div class="chart-card" style="margin-top:16px"><div style="font-size:18px;font-weight:700">${t.chartTitle}</div><div class="muted small" style="margin-top:4px">${t.chartSub}</div><div class="bars">`;r.forEach(item=>{const width=Math.max(8,(item.total/max)*100);html+=`<div class="bar-row"><div class="bar-label">${escapeHtml(item.option)}</div><div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div><div class="bar-value">${item.total}</div></div>`});html+=`</div></div><div class="rank-table">`;r.forEach((item,idx)=>{html+=`<div class="rank-item"><div class="rank-badge">${t.rank} #${idx+1}</div><div style="font-weight:700">${escapeHtml(item.option)}</div><div style="font-size:24px;font-weight:700;text-align:right">${item.total}</div></div>`});html+=`</div><div class="summary-box small" style="margin-top:16px"><strong>${t.why}</strong><br>${t.why1}<br>${t.why2}<br>${t.why3}</div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn" onclick="restartFlow()">${t.restart}</button></div></div>`}
html+='</div>';main.innerHTML=html}
function render(){renderChrome();renderMain();saveState()}
function selectPreset(id){selectedPresetId=id;scenario=buildScenarioFromPreset(id,lang);render()}
function updateScenario(field,value){scenario[field]=value;saveState()}
function goNext(){if(currentStep<5){currentStep+=1;render()}}
function goBack(){if(currentStep>1){currentStep-=1;render()}}
function restartFlow(){currentStep=1;render()}
function addOption(){const name=(lang==='zh'?'新選項 ':'New Option ')+(scenario.options.length+1);scenario.options.push(name);scenario.optionScores[name]={};scenario.optionProbabilities[name]={};scenario.factors.forEach(f=>{scenario.optionScores[name][f.id]=5;scenario.optionProbabilities[name][f.id]=1});render()}
function renameOption(index,value){const old=scenario.options[index];scenario.options[index]=value;scenario.optionScores[value]=scenario.optionScores[old]||{};scenario.optionProbabilities[value]=scenario.optionProbabilities[old]||{};if(old!==value){delete scenario.optionScores[old];delete scenario.optionProbabilities[old]}saveState()}
function removeOption(name){if(scenario.options.length<=2){alert(T[lang].noLessThan2);return}scenario.options=scenario.options.filter(o=>o!==name);delete scenario.optionScores[name];delete scenario.optionProbabilities[name];render()}
function addFactor(){const factor={id:uid(),name:(lang==='zh'?'新因子 ':'New Factor ')+(scenario.factors.length+1),weight:10};scenario.factors.push(factor);scenario.options.forEach(opt=>{scenario.optionScores[opt][factor.id]=5;scenario.optionProbabilities[opt][factor.id]=1});render()}
function updateFactor(id,field,value){scenario.factors=scenario.factors.map(f=>f.id===id?{...f,[field]:field==='weight'?Number(value):value}:f);saveState();renderMain()}
function removeFactor(id){if(scenario.factors.length<=2){alert(T[lang].noLessThan2);return}scenario.factors=scenario.factors.filter(f=>f.id!==id);scenario.options.forEach(opt=>{delete scenario.optionScores[opt][id];delete scenario.optionProbabilities[opt][id]});render()}
function updateCell(option,factorId,kind,value){if(kind==='score')scenario.optionScores[option][factorId]=Math.max(0,Math.min(10,Number(value)||0));if(kind==='prob')scenario.optionProbabilities[option][factorId]=Math.max(0,Math.min(100,Number(value)||0))/100;saveState()}
function exportDecision(){const blob=new Blob([JSON.stringify({lang,currentStep,selectedPresetId,scenario},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${T[lang].exportName}.decision`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function importDecision(file){const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(data.lang)lang=data.lang;if(data.selectedPresetId)selectedPresetId=data.selectedPresetId;if(data.currentStep)currentStep=data.currentStep;if(data.scenario)scenario=data.scenario;historyOpen=false;render()}catch(err){alert(T[lang].importErr)}};reader.readAsText(file)}
function resetAll(){selectedPresetId=PRESETS[lang][0].id;scenario=buildScenarioFromPreset(selectedPresetId,lang);currentStep=1;localStorage.removeItem(STORAGE_KEY);historyOpen=false;render()}
function switchLang(){lang=lang==='zh'?'en':'zh';if(!(PRESETS[lang]||[]).some(p=>p.id===selectedPresetId))selectedPresetId=PRESETS[lang][0].id;scenario=buildScenarioFromPreset(selectedPresetId,lang);render()}
const modal=document.getElementById('historyModal');
document.getElementById('langBtn').addEventListener('click',switchLang);
document.getElementById('historyToggleBtn').addEventListener('click',()=>{historyOpen=true;renderChrome()});
document.getElementById('closeHistoryBtn').addEventListener('click',()=>{historyOpen=false;renderChrome()});
modal.addEventListener('click',e=>{if(e.target===modal){historyOpen=false;renderChrome()}});
document.getElementById('exportBtn').addEventListener('click',exportDecision);
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importDecision(e.target.files[0]);e.target.value=''});
document.getElementById('resetAllBtn').addEventListener('click',resetAll);
loadState();render();
</script>
</body>
</html>
