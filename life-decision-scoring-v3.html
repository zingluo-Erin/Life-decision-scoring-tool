  <style>

    *{box-sizing:border-box}html,body{margin:0;padding:0;background:linear-gradient(180deg,#fbfcfe 0%, #f6f8fc 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit}

ment readiness',weight:25},{id:'value',name:'Value alignment',weight:25},{id:'finance',name:'Financial and life readiness',weight:20},{id:'family',name:'Family and practical integration',weight:15},{id:'timing',name:'Timing in life stage',weight:15}]},{id:'child',title:'Should I have a child?',description:'Useful for comparing having a child now, later, or not at all.',options:['Plan for a child now','Wait and revisit','Do not have children'],factors:[{id:'desire',name:'Inner desire',weight:25},{id:'energy',name:'Mental and physical readiness',weight:20},{id:'finance',name:'Financial capacity',weight:20},{id:'support',name:'Partner / family support system',weight:20},{id:'lifestyle',name:'Lifestyle impact',weight:15}]}]};
const T={zh:{appTitle:'人生重大決策評估器',appSubtitle:'把抽象糾結拆成可以比較的選項、因子、權重與機率。',langBtn:'English',historyOpen:'目前決策',historyTitle:'目前決策',timelineTitle:'進度',fileActionsTitle:'資料操作',exportBtn:'匯出決策',importBtn:'載入決策',fileActionsHint:'可把目前決策存成 JSON，或載入之前的決策檔。',storageTitle:'本機資料',storageHint:'本工具會自動儲存你目前的內容於此瀏覽器。',resetAllBtn:'清空目前資料',next:'下一步',back:'上一步',finish:'查看結果',restart:'重新開始',stepLabel:'Step',steps:['1. 選擇決策主題','2. 定義選項','3. 定義因子與權重','4. 為每個選項打分','評估結果'],chooseTopic:'1. 選擇決策主題',chooseTopicSub:'先選一個接近你目前狀況的主題，再按下一步。',topicName:'主題名稱',topicDesc:'補充說明',topicDescHint:'可以簡單寫下這次決策的背景或限制。',defineOptions:'2. 定義選項',defineOptionsSub:'你想比較的選項都可以自由新增、刪除、修改。',addOption:'新增選項',option:'選項',defineFactors:'3. 定義因子與權重',defineFactorsSub:'先定義你在意的因子，再設定它在整體決策中的重要比例。',addFactor:'新增因子',factor:'因子名稱',weight:'權重',weightHint:'權重 - 在你心目中對於這個因子在意的比例',scoring:'4. 為每個選項打分',scoringSub:'除了分數，也請估計這個因子對該選項實際會發生的機率。',score:'分數',probability:'機率',scoreHint:'分數範圍為 0 到 10，越高代表越符合你的期待。',probabilityHint:'機率 - 這個因子發生的可能性，預設值為 1 代表必定發生，可以自行調整可能發生的百分比',resultTitle:'評估結果',resultSub:'計算邏輯：各個因子分數 × 權重 × 發生機率，再加總得到總分。',highest:'目前最高分選項',rank:'排名',why:'解讀提醒',why1:'這個工具是協助思考的框架，不是要取代你的直覺。',why2:'如果前兩名非常接近，通常表示你還需要補充一兩個關鍵因子。',why3:'如果高分選項讓你仍然抗拒，往往代表還有隱性情緒因素尚未被納入。',remove:'刪除',totalWeight:'權重總和',noLessThan2:'至少保留兩個',importErr:'載入失敗，請確認 JSON 格式是否正確。',exportName:'life-decision'},en:{appTitle:'Life Decision Scoring Tool',appSubtitle:'Turn vague dilemmas into comparable options, factors, weights, and probabilities.',langBtn:'中文',historyOpen:'Current Decision',historyTitle:'Current Decision',timelineTitle:'Progress',fileActionsTitle:'Data Actions',exportBtn:'Export Decision',importBtn:'Load Decision',fileActionsHint:'Save your current setup as JSON, or load a previous decision file.',storageTitle:'Local Storage',storageHint:'This tool auto-saves your current content in this browser.',resetAllBtn:'Clear Current Data',next:'Next',back:'Back',finish:'View Result',restart:'Start Over',stepLabel:'Step',steps:['1. Choose a decision topic','2. Define options','3. Define factors and weights','4. Score each option','Result'],chooseTopic:'1. Choose a decision topic',chooseTopicSub:'Pick the closest preset and continue.',topicName:'Topic title',topicDesc:'Background',topicDescHint:'Briefly note the context or constraints of this decision.',defineOptions:'2. Define options',defineOptionsSub:'Add, remove, or rename the options you want to compare.',addOption:'Add option',option:'Option',defineFactors:'3. Define factors and weights',defineFactorsSub:'Define what matters to you, then assign relative importance.',addFactor:'Add factor',factor:'Factor name',weight:'Weight',weightHint:'Weight - how much this factor matters to you in the overall decision',scoring:'4. Score each option',scoringSub:'For each factor, set both a score and the probability that it will actually happen for that option.',score:'Score',probability:'Probability',scoreHint:'Scores range from 0 to 10. Higher means the option matches your expectation better.',probabilityHint:'Probability - the chance this factor will happen. Default value 1 means it will definitely happen. You can adjust the percentage.',resultTitle:'Result',resultSub:'Calculation: factor score × weight × probability, summed across all factors.',highest:'Top option',rank:'Rank',why:'How to read this',why1:'This tool structures your thinking. It does not replace your intuition.',why2:'If the top two options are very close, you likely need one or two more key factors.',why3:'If the winning option still feels wrong, some hidden emotional factor may still be missing.',remove:'Remove',totalWeight:'Total weight',noLessThan2:'Keep at least two',importErr:'Failed to load. Please check whether the JSON format is valid.',exportName:'life-decision'}};
const STORAGE_KEY='life_decision_tool_v3'; let lang='zh'; let currentStep=1; let selectedPresetId=PRESETS.zh[0].id; let historyOpen=false; function uid(){return Math.random().toString(36).slice(2,9)}
function buildScenarioFromPreset(id,language=lang){const preset=PRESETS[language].find(p=>p.id===id)||PRESETS[language][0]; const optionScores={}, optionProbabilities={}; preset.options.forEach(opt=>{optionScores[opt]={}; optionProbabilities[opt]={}; preset.factors.forEach(f=>{optionScores[opt][f.id]=5; optionProbabilities[opt][f.id]=1;});}); return {topicTitle:preset.title,topicDescription:preset.description,presetId:preset.id,options:[...preset.options],factors:preset.factors.map(f=>({...f})),optionScores,optionProbabilities};}
let scenario=buildScenarioFromPreset(selectedPresetId,lang);
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify({lang,currentStep,selectedPresetId,scenario}))} function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY); if(!raw)return; const data=JSON.parse(raw); if(data.lang)lang=data.lang; if(data.selectedPresetId)selectedPresetId=data.selectedPresetId; if(data.scenario)scenario=data.scenario; if(data.currentStep)currentStep=data.currentStep;}catch(e){}}
function normalizeWeights(factors){const total=factors.reduce((s,f)=>s+Number(f.weight||0),0)||1; return factors.map(f=>({...f,normalized:Number(f.weight||0)/total}))}
function results(){const factors=normalizeWeights(scenario.factors); return scenario.options.map(opt=>{const total=factors.reduce((sum,f)=>{const score=Number((scenario.optionScores[opt]||{})[f.id]||0); const probability=Number((scenario.optionProbabilities[opt]||{})[f.id]??1); return sum+(score*f.normalized*probability);},0); return {option:opt,total:Number(total.toFixed(2))};}).sort((a,b)=>b.total-a.total)}
function escapeHtml(str){return String(str??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))} function escapeJs(str){return String(str??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function render(){const t=T[lang]; document.documentElement.lang=lang==='zh'?'zh-Hant':'en'; ['appTitle','appSubtitle','langBtn','historyTitle','timelineTitle','fileActionsTitle','exportBtn','importBtn','fileActionsHint','storageTitle','storageHint','resetAllBtn'].forEach(()=>{}); document.getElementById('appTitle').textContent=t.appTitle; document.getElementById('appSubtitle').textContent=t.appSubtitle; document.getElementById('langBtn').textContent=t.langBtn; document.getElementById('historyToggleBtn').textContent=t.historyOpen; document.getElementById('historyTitle').textContent=t.historyTitle; document.getElementById('timelineTitle').textContent=t.timelineTitle; document.getElementById('fileActionsTitle').textContent=t.fileActionsTitle; document.getElementById('exportBtn').textContent=t.exportBtn; document.getElementById('importBtn').textContent=t.importBtn; document.getElementById('fileActionsHint').textContent=t.fileActionsHint; document.getElementById('storageTitle').textContent=t.storageTitle; document.getElementById('storageHint').textContent=t.storageHint; document.getElementById('resetAllBtn').textContent=t.resetAllBtn; renderHistory(); renderMain(); saveState();}
function renderHistory(){const panel=document.getElementById('historyPanel'); panel.classList.toggle('collapsed',!historyOpen); const steps=T[lang].steps.slice(0,4); document.getElementById('timeline').innerHTML=steps.map((label,idx)=>{const no=idx+1; const cls=no<currentStep?'done':no===currentStep?'active':''; return `<div class="progress-item ${cls}"><div class="progress-no">${no}</div><div><div style="font-weight:600">${label}</div></div></div>`}).join('')}
function renderMain(){const t=T[lang]; const main=document.getElementById('mainPanel'); let html=''; if(currentStep===1){html+=`<div class="step-chip">${t.stepLabel} 1</div><div class="step-title"><div><h2>${t.chooseTopic}</h2><div class="muted small">${t.chooseTopicSub}</div></div></div><div class="grid topics">`; PRESETS[lang].forEach(p=>{html+=`<button class="topic-card ${selectedPresetId===p.id?'active':''}" onclick="selectPreset('${p.id}')"><div style="font-weight:700">${p.title}</div><div class="desc">${p.description}</div></button>`}); html+=`</div><div class="grid" style="margin-top:18px"><div class="field"><div class="label">${t.topicName}</div><input class="input" value="${escapeHtml(scenario.topicTitle)}" oninput="updateScenario('topicTitle', this.value)"></div><div class="field"><div class="label">${t.topicDesc}</div><textarea class="textarea" oninput="updateScenario('topicDescription', this.value)">${escapeHtml(scenario.topicDescription||'')}</textarea><div class="hint">${t.topicDescHint}</div></div></div><div class="actions"><div></div><div><button class="btn primary" onclick="goNext()">${t.next}</button></div></div>`}
if(currentStep===2){html+=`<div class="step-chip">${t.stepLabel} 2</div><div class="step-title"><div><h2>${t.defineOptions}</h2><div class="muted small">${t.defineOptionsSub}</div></div><button class="btn" onclick="addOption()">${t.addOption}</button></div><div class="item-list">`; scenario.options.forEach((opt,idx)=>{html+=`<div class="item"><div class="item-grid"><input class="input" value="${escapeHtml(opt)}" oninput="renameOption(${idx}, this.value)"><div class="badge">${t.option} ${idx+1}</div><button class="danger-btn" onclick="removeOption('${escapeJs(opt)}')">${t.remove}</button></div></div>`}); html+=`</div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn primary" onclick="goNext()">${t.next}</button></div></div>`}
if(currentStep===3){html+=`<div class="step-chip">${t.stepLabel} 3</div><div class="step-title"><div><h2>${t.defineFactors}</h2><div class="muted small">${t.defineFactorsSub}</div></div><button class="btn" onclick="addFactor()">${t.addFactor}</button></div><div class="summary-box small"><strong>${t.weight}</strong><br>${t.weightHint}</div><div class="item-list" style="margin-top:14px">`; scenario.factors.forEach(f=>{html+=`<div class="item"><div class="factor-grid"><input class="input" value="${escapeHtml(f.name)}" oninput="updateFactor('${f.id}','name',this.value)"><input class="input" type="number" min="0" step="1" value="${Number(f.weight||0)}" oninput="updateFactor('${f.id}','weight',this.value)"><button class="danger-btn" onclick="removeFactor('${f.id}')">${t.remove}</button></div></div>`}); const totalWeight=scenario.factors.reduce((s,f)=>s+Number(f.weight||0),0); html+=`</div><div class="hint" style="margin-top:10px">${t.totalWeight}: ${totalWeight}</div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn primary" onclick="goNext()">${t.next}</button></div></div>`}
if(currentStep===4){html+=`<div class="step-chip">${t.stepLabel} 4</div><div class="step-title"><div><h2>${t.scoring}</h2><div class="muted small">${t.scoringSub}</div></div></div><div class="summary-box small"><strong>${t.score}</strong><br>${t.scoreHint}<br><br><strong>${t.probability}</strong><br>${t.probabilityHint}</div><div class="table-wrap" style="margin-top:14px"><table><thead><tr><th>${t.factor}</th>`; scenario.options.forEach(opt=>{html+=`<th>${escapeHtml(opt)}</th>`}); html+=`</tr></thead><tbody>`; scenario.factors.forEach(f=>{html+=`<tr><td><div style="font-weight:600">${escapeHtml(f.name)}</div><div class="hint">${t.weight}: ${Number(f.weight||0)}</div></td>`; scenario.options.forEach(opt=>{const score=Number((scenario.optionScores[opt]||{})[f.id]??5); const prob=Number((scenario.optionProbabilities[opt]||{})[f.id]??1); const probPercent=Math.round(prob*100); html+=`<td><div class="row"><div><div class="hint">${t.score}</div><input class="input num-input" type="number" min="0" max="10" step="1" value="${score}" oninput="updateCell('${escapeJs(opt)}','${f.id}','score',this.value)"></div><div><div class="hint">${t.probability}</div><input class="input num-input" type="number" min="0" max="100" step="1" value="${probPercent}" oninput="updateCell('${escapeJs(opt)}','${f.id}','prob',this.value)"> <span class="hint">%</span></div></div></td>`}); html+=`</tr>`}); html+=`</tbody></table></div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn primary" onclick="goNext()">${t.finish}</button></div></div>`}
if(currentStep===5){const r=results(); const top=r[0]; html+=`<div class="step-chip">${t.steps[4]}</div><div class="step-title"><div><h2>${t.resultTitle}</h2><div class="muted small">${t.resultSub}</div></div></div><div class="results">`; if(top){html+=`<div class="result-card winner"><div class="small" style="opacity:.85">${t.highest}</div><div style="font-size:28px;font-weight:700;margin-top:6px">${escapeHtml(top.option)}</div><div class="small" style="opacity:.85;margin-top:8px">${top.total} / 10</div></div>`} r.forEach((item,idx)=>{html+=`<div class="result-card"><div class="space-between"><div><div class="muted small">${t.rank} #${idx+1}</div><div style="font-weight:700">${escapeHtml(item.option)}</div></div><div style="font-size:26px;font-weight:700">${item.total}</div></div></div>`}); html+=`</div><div class="summary-box small" style="margin-top:16px"><strong>${t.why}</strong><br>${t.why1}<br>${t.why2}<br>${t.why3}</div><div class="actions"><div><button class="btn" onclick="goBack()">${t.back}</button></div><div><button class="btn" onclick="restartFlow()">${t.restart}</button></div></div>`} main.innerHTML=html}
function selectPreset(id){selectedPresetId=id; scenario=buildScenarioFromPreset(id,lang); render()} function updateScenario(field,value){scenario[field]=value; render()} function goNext(){if(currentStep<5)currentStep+=1; render()} function goBack(){if(currentStep>1)currentStep-=1; render()} function restartFlow(){currentStep=1; render()}
function addOption(){const name=(lang==='zh'?'新選項 ':'New Option ')+(scenario.options.length+1); scenario.options.push(name); scenario.optionScores[name]={}; scenario.optionProbabilities[name]={}; scenario.factors.forEach(f=>{scenario.optionScores[name][f.id]=5; scenario.optionProbabilities[name][f.id]=1}); render()}
function renameOption(index,value){const old=scenario.options[index]; scenario.options[index]=value; scenario.optionScores[value]=scenario.optionScores[old]||{}; scenario.optionProbabilities[value]=scenario.optionProbabilities[old]||{}; if(old!==value){delete scenario.optionScores[old]; delete scenario.optionProbabilities[old]} render()}
function removeOption(name){if(scenario.options.length<=2){alert(T[lang].noLessThan2); return} scenario.options=scenario.options.filter(o=>o!==name); delete scenario.optionScores[name]; delete scenario.optionProbabilities[name]; render()}
function addFactor(){const factor={id:uid(),name:(lang==='zh'?'新因子 ':'New Factor ')+(scenario.factors.length+1),weight:10}; scenario.factors.push(factor); scenario.options.forEach(opt=>{scenario.optionScores[opt][factor.id]=5; scenario.optionProbabilities[opt][factor.id]=1}); render()}
function updateFactor(id,field,value){scenario.factors=scenario.factors.map(f=>f.id===id?{...f,[field]:field==='weight'?Number(value):value}:f); render()} function removeFactor(id){if(scenario.factors.length<=2){alert(T[lang].noLessThan2); return} scenario.factors=scenario.factors.filter(f=>f.id!==id); scenario.options.forEach(opt=>{delete scenario.optionScores[opt][id]; delete scenario.optionProbabilities[opt][id]}); render()}
function updateCell(option,factorId,kind,value){if(kind==='score')scenario.optionScores[option][factorId]=Math.max(0,Math.min(10,Number(value))); if(kind==='prob')scenario.optionProbabilities[option][factorId]=Math.max(0,Math.min(100,Number(value)))/100; saveState()}
function exportJson(){const blob=new Blob([JSON.stringify({lang,currentStep,selectedPresetId,scenario},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${T[lang].exportName}.json`; a.click(); URL.revokeObjectURL(a.href)}
function importJson(file){const reader=new FileReader(); reader.onload=e=>{try{const data=JSON.parse(e.target.result); if(data.lang)lang=data.lang; if(data.selectedPresetId)selectedPresetId=data.selectedPresetId; if(data.currentStep)currentStep=data.currentStep; if(data.scenario)scenario=data.scenario; render()}catch(err){alert(T[lang].importErr)}}; reader.readAsText(file)}
function resetAll(){selectedPresetId=PRESETS[lang][0].id; scenario=buildScenarioFromPreset(selectedPresetId,lang); currentStep=1; localStorage.removeItem(STORAGE_KEY); render()} function switchLang(){const oldPresetId=selectedPresetId; lang=lang==='zh'?'en':'zh'; selectedPresetId=oldPresetId; scenario=buildScenarioFromPreset(selectedPresetId,lang); render()}
document.getElementById('langBtn').addEventListener('click',switchLang); document.getElementById('historyToggleBtn').addEventListener('click',()=>{historyOpen=!historyOpen; render()}); document.getElementById('collapseHistoryBtn').addEventListener('click',()=>{historyOpen=false; render()}); document.getElementById('exportBtn').addEventListener('click',exportJson); document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click()); document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importJson(e.target.files[0]); e.target.value=''}); document.getElementById('resetAllBtn').addEventListener('click',resetAll); loadState(); render();
</script>
</body>
</html>
